<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sphère Dentaire</title>
    <script type="text/javascript">
      var l = window.location;
      // Si l'URL contient déjà '?/' on ne redirige pas pour éviter la boucle
      if (l.search.indexOf('?/') === -1) {
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body>
  </body>
</html>
