<section class="team">
  <h2>L’équipe</h2>
  <div class="team-grid">
    <div class="member" *ngFor="let member of members">
      <div class="member-img-container">
        <img [src]="member.img" [alt]="member.name" />
      </div>
      <h3>{{ member.name }}</h3>
      <p>{{ member.role }}</p>
      <p *ngIf="member.university" class="university">{{ member.university }}</p>
    </div>
  </div>

  <div class="team-actions">
    <a class="btn-primary"
       href="https://www.doctolib.fr/cabinet-dentaire/les-clayes-sous-bois/cabinet-sphere-dentaire/booking/motives?specialityId=1&telehealth=false&placeId=practice-654830&bookingFunnelSource=profile"
       target="_blank" rel="noopener">
      PRENDRE RENDEZ-VOUS
    </a>
  </div>
</section>
