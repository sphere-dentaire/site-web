<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sphère Dentaire</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/img/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <script type="text/javascript">
    (function(l) {
      var search = decodeURIComponent(l.search);
      if (search[1] === '/') {
        var path = search.slice(2).replace(/~and~/g, '&').replace(/[=&].*$/, '');
        window.history.replaceState(null, null, '/' + path + l.hash);
      }
    }(window.location))
  </script>
</head>
